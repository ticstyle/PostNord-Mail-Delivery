name: Validate Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev
  schedule:
    - cron: "0 0 * * *"
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hassfest:
    name: Run Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: Run HACS Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  ruff:
    name: Code Formatting & Linting
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Run Ruff Check
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --fix custom_components/postnord_mail_delivery"

      - name: Run Ruff Format
        uses: astral-sh/ruff-action@v3
        with:
          args: "format custom_components/postnord_mail_delivery"

      - name: Commit automatic formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format code with Ruff"

  mypy:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Cache Mypy internal analysis
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: ${{ runner.os }}-mypy-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-mypy-

      - name: Install Mypy & Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Mypy
        run: mypy custom_components/postnord_mail_delivery
