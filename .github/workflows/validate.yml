name: Validate Integration

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  schedule:
    - cron: "0 0 * * *"

# Cancel in-progress runs when pushing new commits to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hassfest:
    name: Run Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: Run HACS Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  ruff:
    name: Code Formatting & Linting
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives GitHub permission to push formatting fixes back
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref }} # Targets the active PR branch or current branch

      - name: Run Ruff Check
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --fix custom_components/postnord_mail_delivery" # Added --fix to auto-resolve basic lint errors

      - name: Run Ruff Format
        uses: astral-sh/ruff-action@v3
        with:
          args: "format custom_components/postnord_mail_delivery" # Removed --check so files are physically reformatted

      - name: Commit automatic formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format code with Ruff"

  mypy:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Mypy & Dependencies
        run: |
          pip install mypy homeassistant

      - name: Run Mypy
        run: mypy custom_components/postnord_mail_delivery
