name: Sync Translations

on:
  push:
    branches:
      - '**'  # Runs on pushes to ANY branch (dev, main, feature branches)

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Grants permission to push commits back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy strings.json to translations/en.json
        run: |
          cp custom_components/postnord_mail_delivery/strings.json custom_components/postnord_mail_delivery/translations/en.json

      - name: Commit & Push changes if needed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync translations/en.json with strings.json"
          file_pattern: "custom_components/postnord_mail_delivery/translations/en.json"
