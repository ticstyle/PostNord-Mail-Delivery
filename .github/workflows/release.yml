name: Automatic Release

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/postnord_mail_delivery/manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: v$VERSION"
          
          # Match alpha, beta, or rc tags within the manifest string
          if [[ "$VERSION" =~ alpha|beta|rc ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "Pre-release variation detected. Flagging build."
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "Production-stable variation detected."
          fi
          
          # Safety Gate: Only allow pre-releases when on the dev branch
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "dev" && ! "$VERSION" =~ alpha|beta|rc ]]; then
            echo "SHOULD_RELEASE=false" >> $GITHUB_OUTPUT
            echo "Stable version found on dev branch. Skipping release."
          else
            echo "SHOULD_RELEASE=true" >> $GITHUB_OUTPUT
          fi

      - name: Check if Git Tag already exists
        id: check_tag
        if: steps.get_version.outputs.SHOULD_RELEASE == 'true'
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.VERSION }} already exists. Skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build GitHub Release
        if: steps.get_version.outputs.SHOULD_RELEASE == 'true' && steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.get_version.outputs.IS_PRERELEASE == 'true' }}
