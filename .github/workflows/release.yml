name: Automatic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/postnord_mail_delivery/manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: v$VERSION"

      - name: Check if Git Tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.VERSION }} already exists. Skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP archive for manual installation
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cd custom_components
          zip -r ../postnord_mail_delivery.zip postnord_mail_delivery

      - name: Build GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## PostNord Mail Delivery v${{ steps.get_version.outputs.VERSION }}
            
            Automated release triggered by version bump in `main`.
            
            ### 🚀 Installation
            * **HACS:** Find and update the integration directly within Home Assistant.
            * **Manual:** Download the attached `postnord_mail_delivery.zip` asset and extract its contents into your `custom_components/` directory.
          draft: false
          prerelease: false
          files: postnord_mail_delivery.zip
